name: MANTRA Autonomous Dispatch Engine

on:
  schedule:
    
    - cron: '03 22 * * *'  # 23:15 NL tijd (ongeveer)
    
  workflow_dispatch: # Puur en alleen handmatig opstarten via de GitHub website

# 🔥 NIEUW: Dit geeft de GitHub token expliciet toestemming om wijzigingen terug in de repo te pushen
permissions:
  contents: write

jobs:
  run-statistical-arbitrage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Core Mathematics Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib

      - name: Execute Layered Grid Backtest
        run: python Strategies/backtest_autonomous_layered_zscore.py

      - name: Commit and Push Daily Analysis Session Reports
        run: |
          git config --global user.name "MANTRA Algorithmic Automation"
          git config --global user.email "actions@github.com"
          
          git add Strategies/results/daily_analysis_z_score_strategy/
          
          if git diff-index --quiet HEAD --; then
            echo "📭 Geen nieuwe sessieresultaten gevonden deze ronde."
          else
            git commit -m "📊 MANTRA Systemic Sync: Automated Layered Session Reports [skip ci]"
            git push origin HEAD
            echo "✅ Succesvol nieuwe dagsessies en dashboards gepusht!"
          fi
