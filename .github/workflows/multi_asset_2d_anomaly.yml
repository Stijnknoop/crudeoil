name: Multi-Asset 2D Anomaly Detection

permissions:
  contents: write

on:
  # Triggert automatisch zodra de algemene data-ingestie succesvol is afgerond
#  workflow_run:
#    workflows: ["Update Market Data ALL_EPICS"]
#    types:
#      - completed
  # Maakt handmatige uitvoering mogelijk via de GitHub Actions interface
  workflow_dispatch:

jobs:
  analyze-multi-2d:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Installeer de libraries die nodig zijn voor ML, visualisatie, de voortgangsbalk én de backtest
      - name: Install dependencies
        run: |
          pip install pandas scikit-learn matplotlib tqdm

      # Stap 1: Uitvoeren van de pure 2D Safe-Haven cross correlation engine (elke minuut her-trainen)
      - name: Run Multi-Asset Safe Haven ML Engine
        run: python Strategies/strategy_anomaly_multi_2d.py

      # Stap 2: NIEUW - Uitvoeren van de Cross-Asset Pairs Trading Arbitrage Backtester
      - name: Run Cross-Asset Arbitrage Backtest Engine
        run: python Strategies/backtest_anomaly_multi_2d.py

      # Stap 3: Sla alle gegenereerde bestanden (ML CSV + Backtest MD rapport + charts) automatisch op in de repo
      - name: Push Multi-Asset Dashboards and Artifacts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # Voeg de volledige resultatenmap toe (bevat nu alle statistieken en visualisaties)
          git add Strategies/results/strategy_anomaly_multi_2d/
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update MANTRA multi-asset 2d telemetry, statistical arbitrage backtests, and charts"
            git pull --rebase origin master
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          else
            echo "Geen wijzigingen gedetecteerd in de safe-haven resultaten."
          fi
