name: US500 Anomaly Detection

permissions:
  contents: write

on:
  # Triggert automatisch zodra de data-ingestie succesvol is afgerond
  workflow_run:
    workflows: ["Update Market Data ALL_EPICS"]
    types:
      - completed
  # Maakt handmatige uitvoering mogelijk via de GitHub interface
  workflow_dispatch:

jobs:
  analyze-us500:
    runs-on: ubuntu-latest
    # Zorg dat de automatische run alleen start als de vorige workflow ÉCHT succesvol was
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Installeer de libraries die nodig zijn voor ML en visualisatie
      - name: Install dependencies
        run: |
          pip install pandas scikit-learn matplotlib

      # Uitvoeren van het single-asset script uit je repository
      - name: Run US500 Anomaly Detection ML Engine
        run: python Strategies/strategy_anomaly_single.py

      # Sla de gegenereerde bestanden uit de nieuwe resultatenmap op in je repository
      - name: Push Analysis Artifacts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # AANGEPAST: Voeg de volledige nieuwe resultatenmap toe aan de git-commit
          git add Strategies/results/strategy_anomaly_single/
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update US500 anomaly telemetry and chart dashboards in results folder"
            git pull --rebase origin master
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          else
            echo "Geen wijzigingen gedetecteerd in de resultaten."
          fi
